<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Collection | Stuff</title>
</head>
<body style="background-color: black; color: white; font-family: sans-serif; padding: 20px;">

   <!-- Navigation Links -->
   <nav style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
        <img src="blob.png" width="50" height="50" alt="Logo">
        <a href="index.html" style="color: #90ee90; text-decoration: none;">Home</a>
        <a href="page2.html" style="color: #90ee90; text-decoration: none;">About Me</a>
        <a href="page3.html" style="color: #90ee90; text-decoration: none;">Get Featured</a>
        <a href="page4.html" style="color: #90ee90; text-decoration: underline; font-weight: bold;">Stuff</a>
   </nav>

    <header style="text-align: center; margin-bottom: 40px;">
        <h1 style="color: #90ee90;">⭐ Your Vaulted Collection</h1>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">These masterpieces are permanently saved on this device—even if they get removed from the museum floor!</p>

        <!-- VISITOR PASS CARD -->
        <div style="background-color: #1a1a1a; border: 2px solid #90ee90; padding: 25px; border-radius: 12px; max-width: 450px; margin: 20px auto; text-align: center;">
            <h3 id="profile-status" style="margin-bottom: 15px; color: white;">Visitor Pass: Guest</h3>

            <div id="live-pfp-display" style="width: 120px; height: 120px; margin: 0 auto 15px auto; background: black; border-radius: 50%; border: 3px solid #90ee90; padding: 10px; display: flex; align-items: center; justify-content: center;"></div>

            <p style="font-size: 0.8rem; color: #888; margin-bottom: 8px;">Choose your Blob Avatar:</p>
            <div style="display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; background: black; padding: 10px; border-radius: 8px;">
                <div onclick="selectPreset('bored')" style="width: 50px; height: 50px; cursor: pointer; border: 1px solid #333; padding: 4px; border-radius: 6px;">
                    <svg viewBox="0 0 100 100"><path d="M20,50 Q15,20 50,15 T80,50 T50,85 Z" fill="#90ee90"/><circle cx="40" cy="45" r="7" fill="none" stroke="black" stroke-width="3"/><circle cx="60" cy="45" r="7" fill="none" stroke="black" stroke-width="3"/><line x1="42" y1="65" x2="58" y2="65" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>
                </div>
                <div onclick="selectPreset('cool')" style="width: 50px; height: 50px; cursor: pointer; border: 1px solid #333; padding: 4px; border-radius: 6px;">
                    <svg viewBox="0 0 100 100"><path d="M25,50 Q20,15 50,20 T75,50 T50,80 Z" fill="#3a86ff"/><path d="M30,40 L48,40 L45,48 L33,48 Z M52,40 L70,40 L67,48 L55,48 Z" fill="black"/><line x1="45" y1="42" x2="55" y2="42" stroke="black" stroke-width="3"/><path d="M40,62 Q50,72 60,62" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>
                </div>
                <div onclick="selectPreset('fancy')" style="width: 50px; height: 50px; cursor: pointer; border: 1px solid #333; padding: 4px; border-radius: 6px;">
                    <svg viewBox="0 0 100 100"><path d="M30,55 Q10,30 50,15 T70,55 T50,85 Z" fill="#ff007f"/><rect x="35" y="5" width="30" height="15" fill="black"/><line x1="25" y1="20" x2="75" y2="20" stroke="black" stroke-width="4"/><circle cx="42" cy="42" r="6" fill="none" stroke="black" stroke-width="2"/><circle cx="58" cy="42" r="6" fill="none" stroke="black" stroke-width="2"/><path d="M45,65 Q50,58 55,65" fill="none" stroke="black" stroke-width="3"/></svg>
                </div>
                <div onclick="selectPreset('sleepy')" style="width: 50px; height: 50px; cursor: pointer; border: 1px solid #333; padding: 4px; border-radius: 6px;">
                    <svg viewBox="0 0 100 100"><path d="M20,60 Q30,20 50,25 T80,60 T50,80 Z" fill="#ffb703"/><path d="M32,45 Q40,52 44,45" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/><path d="M56,45 Q64,52 68,45" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/><text x="72" y="30" fill="#ffb703" font-family="sans-serif" font-weight="bold" font-size:12px;">Zzz</text></svg>
                </div>
            </div>

            <input type="text" id="username-input" placeholder="Type username here..." style="padding: 8px; margin-bottom: 12px; border-radius: 4px; border: 1px solid #90ee90; background: black; color: white; width: 80%; text-align: center;">
            <br>
            <button onclick="saveProfile()" style="background: #90ee90; color: black; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">Save Changes</button>
            <p id="save-msg" style="color: #90ee90; font-size: 0.85rem; margin-top: 10px; min-height: 20px;"></p>
        </div>
    </header>

    <!-- VAULT GRID DISPLAY -->
  <b3>LIKED VAULT</b3>
    <main id="archived-vault-grid" style="display: flex; flex-wrap: wrap; gap: 20px; min-height: 150px; background: #111; padding: 20px; border-radius: 12px; border: 1px dashed #333; justify-content: center;">
        <p id="empty-vault-msg" style="color: #444; margin: auto; font-weight: bold; font-family: monospace;">VAULT EMPTY... HEART SOME GALLERY ARTWORK</p>
    </main>
    <script>
        const pfpTemplates = {
            bored: `<svg viewBox="0 0 100 100" width="100%"><path d="M20,50 Q15,20 50,15 T80,50 T50,85 Z" fill="#90ee90"/><circle cx="40" cy="45" r="7" fill="none" stroke="black" stroke-width="3"/><circle cx="60" cy="45" r="7" fill="none" stroke="black" stroke-width="3"/><line x1="42" y1="65" x2="58" y2="65" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>`,
            cool: `<svg viewBox="0 0 100 100" width="100%"><path d="M25,50 Q20,15 50,20 T75,50 T50,80 Z" fill="#3a86ff"/><path d="M30,40 L48,40 L45,48 L33,48 Z M52,40 L70,40 L67,48 L55,48 Z" fill="black"/><line x1="45" y1="42" x2="55" y2="42" stroke="black" stroke-width="3"/><path d="M40,62 Q50,72 60,62" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/></svg>`,
            fancy: `<svg viewBox="0 0 100 100" width="100%"><path d="M30,55 Q10,30 50,15 T70,55 T50,85 Z" fill="#ff007f"/><rect x="35" y="5" width="30" height="15" fill="black"/><line x1="25" y1="20" x2="75" y2="20" stroke="black" stroke-width="4"/><circle cx="42" cy="42" r="6" fill="none" stroke="black" stroke-width="2"/><circle cx="58" cy="42" r="6" fill="none" stroke="black" stroke-width="2"/><path d="M45,65 Q50,58 55,65" fill="none" stroke="black" stroke-width="3"/></svg>`,
            sleepy: `<svg viewBox="0 0 100 100" width="100%"><path d="M20,60 Q30,20 50,25 T80,60 T50,80 Z" fill="#ffb703"/><path d="M32,45 Q40,52 44,45" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/><path d="M56,45 Q64,52 68,45" fill="none" stroke="black" stroke-width="3" stroke-linecap="round"/><text x="72" y="30" fill="#ffb703" font-family="sans-serif" font-weight="bold" font-size:12px;">Zzz</text></svg>`
        };

        let activePFP = "bored";

        document.addEventListener("DOMContentLoaded", function() {
            const savedName = localStorage.getItem("museumUser");
            const savedPFP = localStorage.getItem("museumPFP");

            if (savedName) {
                document.getElementById("username-input").value = savedName;
                document.getElementById("profile-status").textContent = "Visitor Pass: " + savedName;
            }
            if (savedPFP && pfpTemplates[savedPFP]) {
                activePFP = savedPFP;
            }
            document.getElementById("live-pfp-display").innerHTML = pfpTemplates[activePFP];
            loadArchivedVault();
        });

        function selectPreset(choice) {
            if (pfpTemplates[choice]) {
                activePFP = choice;
                document.getElementById("live-pfp-display").innerHTML = pfpTemplates[choice];
                document.getElementById("save-msg").textContent = "✨ Selected " + choice + " blob! Press save to apply.";
                document.getElementById("save-msg").style.color = "orange";
            }
        }

        function saveProfile() {
            const nameInput = document.getElementById("username-input").value;
            if (nameInput.trim() === "") {
                document.getElementById("save-msg").textContent = "❌ Please type a username first!";
                document.getElementById("save-msg").style.color = "red";
                return;
            }
            localStorage.setItem("museumUser", nameInput);
            localStorage.setItem("museumPFP", activePFP);
            document.getElementById("profile-status").textContent = "Visitor Pass: " + nameInput;
            document.getElementById("save-msg").textContent = "💾 Username and avatar saved!";
            document.getElementById("save-msg").style.color = "#90ee90";
        }

        function loadArchivedVault() {
            const vaultContainer = document.getElementById("archived-vault-grid");
            const emptyMsg = document.getElementById("empty-vault-msg");
            const archivedData = JSON.parse(localStorage.getItem("museumFavoritesData") || "{}");
            const keys = Object.keys(archivedData);

            if (keys.length > 0) {
                emptyMsg.style.display = "none";
            } else {
                emptyMsg.style.display = "block";
                return;
            }

            keys.forEach(id => {
                const item = archivedData[id];
                const cardNode = document.createElement("div");
                cardNode.className = "exhibit-card";
                cardNode.style.cssText = "background: #1a1a1a; border: 2px solid #90ee90; padding: 15px; border-radius: 8px; width: 180px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.4);";

                cardNode.innerHTML = `
                    <img src="${item.img}" alt="${item.title}" style="max-width: 100%; height: auto; border-radius: 4px; display:block; margin: 0 auto 10px auto;">
                    <h3 style="font-size:1.1rem; color:white; margin-bottom:4px;">${item.title}</h3>
                    <p style="font-size:0.85rem; color:#aaa; margin-bottom:4px;">${item.author}</p>
                    <span style="font-size:0.75rem; color:#666; display:block; margin-bottom:12px;">${item.time}</span>
                    <button onclick="removeCardFromVault('${id}')" style="background: black; color: red; border: 1px solid red; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size:0.8rem;">❌ Delete Record</button>
                `;
                vaultContainer.appendChild(cardNode);
            });
        }

        function removeCardFromVault(artworkId) {
            const archivedData = JSON.parse(localStorage.getItem("museumFavoritesData") || "{}");
            if (archivedData[artworkId]) {
                delete archivedData[artworkId];
                localStorage.setItem("museumFavoritesData", JSON.stringify(archivedData));
                location.reload(); 
            }
        }
    </script>
</body>
</html>
